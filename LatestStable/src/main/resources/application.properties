server.port=8080
spring.application.name=carbon-scope-backend
server.servlet.context-path=/api

# ?? MySQL DATABASE ????????????????????????????????????????????????
spring.datasource.url=jdbc:mysql://localhost:3306/carbonscopedb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=carbonuser
spring.datasource.password=Carbon@123

# ?? JPA / HIBERNATE ???????????????????????????????????????????????
# update = tables already hain to update karo
# create-drop mat use karo ? data delete ho jaata hai!
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.defer-datasource-initialization=true

# ?? JSON ??????????????????????????????????????????????????????????
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

# ?? LOGGING ???????????????????????????????????????????????????????
logging.level.root=INFO
logging.level.com.example.LatestStable=DEBUG

# ?? ACTUATOR ??????????????????????????????????????????????????????
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ?? ASYNC ?????????????????????????????????????????????????????????
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=20
spring.task.execution.pool.queue-capacity=100

# ?? CARBON CONSTANTS ??????????????????????????????????????????????
carbon.kwh-per-gb=0.06
carbon.grams-co2-per-kwh=490
carbon.average-page-size-bytes=2621440
carbon.average-co2-per-visit=0.5

# ?? EMAIL ?????????????????????????????????????????????????????????
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ?? AI ????????????????????????????????????????????????????????????
openai.api.key=no-key

# ?? API SECURITY ??????????????????????????????????????????????????
# Ye key frontend ko dena hoga
# Koi bhi random strong string rakho
app.api.key=CarbonScope2024SecretKey@Hackathon

# ?? APP INFO ??????????????????????????????????????????????????????
app.frontend.url=http://localhost:5173
app.name=Carbon Scope
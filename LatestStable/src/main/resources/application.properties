# ================================================================
# CARBON SCOPE ? APPLICATION CONFIGURATION
# ================================================================
#
# This file controls HOW Spring Boot configures itself.
# It's read at startup and sets up the database, server,
# logging, and everything else.
#
# FORMAT: key=value
# Spring uses "." for hierarchy: spring.datasource.url
# ================================================================


# ----------------------------------------------------------------
# SERVER CONFIGURATION
# ----------------------------------------------------------------
# Port the server listens on. Default is 8080.
# To run multiple instances, use different ports.
server.port=8080

# Application name - used in logs and monitoring
spring.application.name=carbon-scope-backend

# Context path: all endpoints start with /api
# Example: GET /api/analyses (not just /analyses)
server.servlet.context-path=/api


# ----------------------------------------------------------------
# DATABASE ? H2 (In-Memory for Development)
# ----------------------------------------------------------------
# H2 is embedded in your app. No installation needed!
# Data is stored in MEMORY ? it RESETS every time you restart.
# This is perfect for development but not production.

# H2 URL format: jdbc:h2:mem:{database-name}
# mem: = in-memory (not saved to disk)
# DB_CLOSE_DELAY=-1 = keep DB alive as long as app runs
# DB_CLOSE_ON_EXIT=FALSE = don't close when JVM exits
spring.datasource.url=jdbc:h2:mem:carbonscopedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE

# H2 driver class (tells Java how to talk to H2)
spring.datasource.driver-class-name=org.h2.Driver

# Username and password for H2 (these are just defaults)
spring.datasource.username=sa
spring.datasource.password=

# H2 Web Console ? accessible at http://localhost:8080/h2
# Lets you browse your database with a GUI in the browser!
spring.h2.console.enabled=true
spring.h2.console.path=/h2
spring.h2.console.settings.web-allow-others=false


# ----------------------------------------------------------------
# JPA / HIBERNATE CONFIGURATION
# ----------------------------------------------------------------
# Hibernate is the JPA implementation Spring uses.

# DDL auto: What to do with database tables at startup?
# create-drop = Create tables when app starts, DROP when it stops
# update      = Update tables if entities changed (use in dev)
# validate    = Just check tables match entities (use in prod)
# none        = Don't touch database (use in production with migrations)
spring.jpa.hibernate.ddl-auto=create-drop

# Show SQL in logs (helpful for debugging, too noisy for production)
spring.jpa.show-sql=true

# Format SQL for readability
spring.jpa.properties.hibernate.format_sql=true

# Database dialect ? tells Hibernate what SQL flavor to use
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Defer datasource initialization
# Ensures data.sql runs AFTER Hibernate creates the tables
spring.jpa.defer-datasource-initialization=true


# ----------------------------------------------------------------
# SPRING MVC / JSON CONFIGURATION
# ----------------------------------------------------------------
# How Spring Boot handles JSON (via Jackson library)

# Don't fail if unknown JSON fields are sent in request
spring.jackson.deserialization.fail-on-unknown-properties=false

# Don't serialize null values in response JSON
# (keeps response clean ? no "fieldName": null)
spring.jackson.default-property-inclusion=non_null

# Date format in JSON responses
spring.jackson.serialization.write-dates-as-timestamps=false


# ----------------------------------------------------------------
# LOGGING CONFIGURATION
# ----------------------------------------------------------------
# Log levels: TRACE < DEBUG < INFO < WARN < ERROR

# Root level (all packages not specified below)
logging.level.root=INFO

# Our application package ? show DEBUG for more details
logging.level.com.carbonscope=DEBUG

# Hibernate SQL ? shows the actual SQL being run
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Log format: shows time, level, thread, class, and message
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n


# ----------------------------------------------------------------
# ACTUATOR (Health Check Endpoints)
# ----------------------------------------------------------------
# Expose health, info, and metrics endpoints
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always


# ----------------------------------------------------------------
# ASYNC CONFIGURATION
# ----------------------------------------------------------------
# Thread pool for @Async methods (used for crawling)
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=20
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=carbonscope-


# ----------------------------------------------------------------
# CARBON CALCULATION CONSTANTS
# (Custom properties ? we'll read these in our service)
# ----------------------------------------------------------------
# kWh of electricity per GB of data transferred
# Source: Sustainable Web Design methodology (0.06 kWh/GB)
carbon.kwh-per-gb=0.06

# CO2 grams per kWh (global average grid intensity)
# Source: IEA 2023 average: 490 gCO2/kWh
carbon.grams-co2-per-kwh=490

# Average website size in bytes (used for comparison)
# Source: HTTP Archive 2023 average: ~2.5 MB
carbon.average-page-size-bytes=2621440

# Baseline CO2 per visit for average website (in grams)
# ~0.5g is the widely cited figure for an average webpage
carbon.average-co2-per-visit=0.5


# ----------------------------------------------------------------
# AI CONFIGURATION (Spring AI + OpenAI)
# ----------------------------------------------------------------
# IMPORTANT: Never put real API keys in this file!
# Use environment variables or application-secret.properties
# The ${} syntax reads from environment variables.
spring.ai.openai.api-key=${OPENAI_API_KEY:dummy-key-replace-in-production}
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.chat.options.temperature=0.7
spring.ai.openai.chat.options.max-tokens=1000
openai.api.key=no-key

